# =============================================================================
# PAPER CLONE CONFIG
# =============================================================================
# Purpose: local paper trading with live-like settings for execution validation.
# Differences from live:
#   - execution.mode is paper
#   - timeframe stays on 1m
#   - leverage stays higher for paper stress-testing
#   - dashboard stays local
# =============================================================================

symbol: "AVAX/USDC:USDC"
timeframe: "3m"
macro_timeframe: "5m"

data:
  market: "auto"

execution:
  mode: "paper"
  market: "usdm"
  paper_futures_mode: "exchange_demo"
  trade_log_file: "trade_log_demo_futures.csv"
  leverage: 10
  paused: false
  close_positions_on_pause: false
  panic_exit: false
  spot_balance_pct: 0.35
  spot_reserve_pct: 0.30
  spot_max_layers: 3
  dynamic_leverage: true
  paper_starting_balance_usdt: 1000
  fee_rate: 0.0006
  fee_slippage_buffer_pct: 0.0002
  fee_edge_multiplier: 1.2
  min_seconds_between_trades: 60
  min_seconds_before_reversal: 60
  reversal_min_confidence: 0.45
  reversal_min_score: 0.25
  reversal_min_net_edge_pct: 0.0020
  break_even_trigger_pct: 0.0030
  break_even_buffer_pct: 0.0008
  profit_trailing_enabled: true
  profit_trailing_activation_pct: 0.0030
  trailing_tp_enabled: true
  trailing_tp_giveback_pct: 0.35
  trailing_tp_min_peak_pct: 0.0060
  trail_tighten_1_pct: 0.0050
  trail_tighten_2_pct: 0.0100
  trail_t1_gap_pct: 0.0040
  trail_t2_gap_pct: 0.0030
  min_profit_after_fees: 0.0010
  exit_on_reversal_only_in_profit: true
  use_limit_orders: true
  use_native_trailing_stop: true
  use_exchange_stop_loss: true
  use_exchange_take_profit: true
  market_fallback_on_timeout: true
  pending_entry_ttl_seconds: 10
  use_resting_support_orders: true
  resting_entry_ttl_seconds: 120
  resting_entry_min_conf: 0.50
  resting_entry_offset_pct: 0.0002
  resting_entry_max_distance_pct: 0.0125
  trailing_callback_pct: 0.65
  same_side_reentry_cooldown_seconds: 300
  same_side_reentry_strong_confidence: 0.85
  scalp_min_hold_seconds: 20
  scalp_runner_enabled: true
  scalp_runner_pullback_pct: 0.0020
  scalp_runner_min_lock_pct: 0.0040
  scalp_runner_exchange_tp_multiplier: 4.0
  scalp_runner_partial_exit_pct: 0.45
  ttl_exit_seconds: 1800

leverage:
  enabled: true
  min_leverage: 1
  max_leverage: 20
  confidence_levels:
    0.02: 2.0
    0.20: 5.0
    0.35: 10.0
    0.50: 15.0
    0.75: 20.0
  use_score_multiplier: true
  score_weight: 0.2
  atr_volatility_scaling: true
  atr_reference_pct: 0.5
  atr_min_multiplier: 0.5

mtf:
  enabled: true
  timeframes: ["1m", "3m", "5m", "10m", "15m", "1h", "4h"]
  min_agree: 2
  require_full_confirmation: false
  strict_veto_on_missing: false
  veto_on_missing: false
  max_age_seconds: 300
  sr_buffer_pct: 0.0015
  mode: "hard"

ui:
  mode: "ansi"
  compact: true
  status_lines: 3
  alt_screen: true

memory:
  max_closed_trades: 5000

logging:
  max_mb: 5
  backups: 3

auto_learning:
  enabled: true
  min_completed_trades: 5
  refresh_closed_trades: 3
  max_recent_trades: 200
  shrinkage: 0.45
  ai_advisor:
    enabled: true
    model: "deepseek-chat"
    max_weight_shift: 0.12

strategy:
  max_spread: 0.0005
  min_conf: 0.15
  signal_smoothing_ticks: 3
  max_ret_30s: 0.0040
  max_ret_5s: 0.0018
  block_on_volume_spike: false
  fixed_trade_usdt: 25
  tp_pct: 0.0060
  sl_pct: 0.0025
  max_structural_sl_pct: 0.0060
  min_reward_risk: 0.65
  range_action_zone_pct: 0.20
  wall_veto_zone_pct: 0.12
  support_veto_pct: 0.0010
  resistance_veto_pct: 0.0010
  support_break_pct: 0.0010
  resistance_break_pct: 0.0010
  max_chase_pct: 0.0030
  mtf_neutral_allow_score: 0.35
  entry_min_confidence_hard: 0.20
  midrange_min_score: 0.28
  mtf_rsi_bull_level: 55
  mtf_rsi_bear_level: 45
  mtf_rsi_min_agree: 2
  vpoc_near_pct: 0.0010
  vpoc_break_pct: 0.0015
  session_filter_enabled: true
  session_block_hours_utc: []
  session_block_min_score: 0.35
  entry_near_resistance_block_pct: 0.0030
  entry_near_support_block_pct: 0.0030
  macd_noise_threshold: 0.00005
  vol_filter_atr_pct: 0.0001
  vol_filter_atr_max_pct: 0.08
  low_vol_min_score: 0.45
  wick_sweep_enabled: true
  wick_sweep_buffer_pct: 0.0008
  wick_sweep_reclaim_pct: 0.0002
  wick_sweep_wick_ratio: 1.6
  wall_reversal_assist: true
  wall_reversal_score_gate: 0.12
  wall_breakout_score_gate: 0.15
  range_position_veto_enabled: true
  range_veto_top_pct: 0.75
  range_veto_bottom_pct: 0.25
  range_veto_escape_score: 0.90
  rsi_ob_entry_gate: 72
  rsi_os_entry_gate: 28
  orb_volume_mult: 1.5
  sr_wall_veto_enabled: false
  spread_atr_ratio_max: 0.15
  ob_midpoint_tolerance_pct: 0.0015
  anchored_vwap_near_pct: 0.0010
  loss_tilt_min_losses: 3
  loss_tilt_pause_losses: 5
  loss_tilt_pause_minutes: 15

rejection_confirmation:
  enabled: true
  min_bars_away: 2
  macd_threshold: 0.0
  pullback_pct: 0.002
  require_psar_flip: true

spot:
  mode: "grid"
  max_layers: 3
  layer_quote_pct: 0.20
  reserve_quote_pct: 0.30
  buy_near_support_pct: 0.0150
  sell_near_resistance_pct: 0.0020
  layer_spacing_pct: 0.0030
  emergency_break_pct: 0.0040
  min_take_profit_pct: 0.0035
  min_trail_profit_quote: 0.10

risk:
  daily_loss_cap: 0.10
  disable_loss_cap: false
  max_open_positions: 1
  min_balance_floor: 0.0

intervals:
  indicator_refresh: 10
  regime_refresh: 300
  tick_delay_seconds: 0.5

ai:
  enabled: true
  model: "gpt-4o-mini"
  overlay_enabled: true
  overlay_refresh_seconds: 60
  trade_gate_enabled: false
  trade_gate_min_interval: 30
  trade_gate_on_error: "allow"
  trade_gate_max_hold_minutes: 60

dashboard:
  enabled: true
  host: "127.0.0.1"
  port: 8766
  candle_limit: 240
