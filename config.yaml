# High-Frequency Scalping Configuration (DOGE/USDT)

symbol: "DOGE/USDC"
timeframe: "5m"           # Base timeframe for execution (matches 15m structure)
macro_timeframe: "1h"     # Macro timeframe for trend alignment

# Market data source (spot vs futures)
data:
  market: "usdm"          # usdm | spot

# Execution Settings
execution:
  mode: "live"                # paper | demo | live
  leverage: 3                # Lower base leverage for safer live scalping
  dynamic_leverage: true       
  paper_starting_balance_usdt: 100
  fee_rate: 0.0             
  dca_enabled: true            # ENABLED: Averaging down to recover trades
  dca_max_steps: 2             # Max 2 extra entries (3 total)
  dca_distance_pct: 0.006      # DCA every -0.60% drop
  fee_slippage_buffer_pct: 0.0  # Zero buffer for aggressive entry
  fee_edge_multiplier: 0.2      # AGGRESSIVE: Trade even if profit is only slightly above fees
  min_seconds_between_trades: 5     # cooldown between any ENTRY/EXIT (very fast)
  min_seconds_before_reversal: 5    # Back to fast reversals
  reversal_min_confidence: 0.08     # BALANCED: 8% min for reversal
  reversal_min_score: 0.05          # Low threshold for score
  reversal_min_net_edge_pct: 0.0002    # 0.02% edge to flip position
  break_even_trigger_pct: 0.0020    # Let winners breathe more before breakeven
  break_even_buffer_pct: 0.0002     # small buffer above entry
  trail_tighten_1_pct: 0.0035       # tighten trail later so trend can run
  trail_tighten_2_pct: 0.0065       # tighten only after a stronger move
  min_profit_after_fees: 0.0002     # small profit floor after fees
  exit_on_reversal_only_in_profit: true 
  use_limit_orders: true            # Use maker orders to target zero fees
  use_native_trailing_stop: true    # Show and enforce a real Binance trailing stop
  trailing_callback_pct: 0.20       # 0.20% callback to lock profit faster
  ttl_exit_seconds: 300             # 5min candles need more time to play out

# Dynamic Leverage (volatility + confidence based position sizing)
leverage:
  enabled: true                # Enable dynamic leverage scaling
  min_leverage: 1              # smallest size for weak signals
  max_leverage: 3              # cap leverage to limit damage on bad trades
  # Confidence thresholds for leverage levels (0-1 scale)
  confidence_levels:
    0.05: 1.0                  # weak signal -> 1x
    0.15: 1.0                  # low confidence -> 1x
    0.30: 1.5                  # moderate confidence -> 1.5x
    0.50: 2.0                  # strong signal -> 2x
    0.75: 3.0                  # max -> 3x
  use_score_multiplier: true   # Also factor in signal score (0-1) to adjust leverage
  score_weight: 0.2            # less aggressive score influence
  atr_volatility_scaling: true  # reduce leverage when volatility spikes
  atr_reference_pct: 0.012     # target ATR% before scaling down
  atr_min_multiplier: 0.5      # keep at least half leverage in high vol

# Multi-Timeframe Trend + S/R
mtf:
  enabled: true
  timeframes: ["1m", "3m", "5m", "15m", "1h", "4h"]
  min_agree: 3                  # Require 3m/5m/15m alignment for entries
  veto_on_missing: false        # DISABLED: Don't wait for all indicators to be perfect
  max_age_seconds: 300          # 5min stale threshold (faster updates)
  sr_buffer_pct: 0.0015         # Tighter S/R buffer (0.15%) for DOGE
  mode: "soft"                  # soft => penalize counter-trend, don't hard block

# Terminal UI
ui:
  mode: "ansi"
  compact: true
  status_lines: 3
  alt_screen: true

# Memory/Log limits (prevents long runs from growing unbounded)
memory:
  max_closed_trades: 5000

logging:
  max_mb: 5
  backups: 3

# Auto-learning from closed trades
# Learns conservative indicator weights from recent ENTRY/EXIT outcomes.
auto_learning:
  enabled: true
  min_completed_trades: 30
  refresh_closed_trades: 10
  max_recent_trades: 300
  shrinkage: 0.35
  ai_advisor:
    enabled: true
    model: "gpt-4o-mini"
    max_weight_shift: 0.12

# Quant Strategy Parameters
strategy:
  max_spread: 0.0005        # TIGHT: 0.05% max spread
  min_conf: 0.10            # Lower gate so it catches more scalp entries
  max_ret_30s: 0.0050     
  max_ret_5s: 0.0025      
  block_on_volume_spike: false  
  fixed_trade_usdt: 50   
  tp_pct: 0.0025          # Trend-friendly scalp target (ride a bit longer)
  sl_pct: 0.0015          # Slightly wider stop for trend continuation
  max_structural_sl_pct: 0.0030  # Skip entries if strong S/R stop is too far away
  min_reward_risk: 0.90          # TP distance must be close to the structural stop risk
  vol_filter_atr_pct: 0.0005  # Minimum ATR% (0.05%)
  vol_filter_atr_max_pct: 0.08  # Maximum ATR% (8%)

# Risk Limits
risk:
  daily_loss_cap: 0.05     # 5% max daily drawdown → halt (higher for scalping)
  max_open_positions: 1    # Strictly 1 trade at a time as requested
  min_balance_floor: 60.0  # Emergency stop at $60 (plenty of room for scalping)

# Refresh Intervals (in ticks, 1 tick ≈ 1 second)
intervals:
  indicator_refresh: 10    # Re-fetch OHLCV & recalculate indicators every 10 ticks (ultra fast)
  regime_refresh: 600      # Re-query AI macro regime every 600 ticks (~10 min)
  tick_delay_seconds: 1    # Seconds between each polling loop iteration

# AI Settings
ai:
  model: "gpt-4o-mini"
  enabled: false           # Disabled AI so it stops vetoing trades for testing

# AI Overlay (Tactical context based on MTF charts)
ai_overlay:
  enabled: true          # ENABLED: AI now watches the 3m/5m/15m charts
  model: "gpt-4o-mini"
  refresh_seconds: 300    # refresh every 5 minutes (matches candle close)

# Trade-Gating AI (evaluates each BUY/SELL before execution)
ai_trade:
  enabled: true           # ENABLED: Final safety check before every order
  model: "gpt-4o-mini"
  min_interval_seconds: 30     # rate-limit AI calls
  on_error: "allow"            # allow | veto
  max_hold_minutes: 60
