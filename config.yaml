# High-Frequency Scalping Configuration (DOGE/USDC)

symbol: "DOGE/USDC"
timeframe: "5m"           # Base timeframe for execution (matches 15m structure)
macro_timeframe: "1h"     # Macro timeframe for trend alignment

# Market data source (spot vs futures)
data:
  market: "usdm"          # usdm | spot

# Execution Settings
execution:
  mode: "live"                # paper | demo | live
  leverage: 5                # SAFER LIVE: cap base leverage at 5x
  dynamic_leverage: true       
  paper_starting_balance_usdt: 100
  fee_rate: 0.0             
  dca_enabled: false           # SAFER LIVE: no averaging down unattended
  dca_max_steps: 0             # No extra entries
  dca_distance_pct: 0.006      # DCA every -0.60% drop
  fee_slippage_buffer_pct: 0.0  # Zero buffer for aggressive entry
  fee_edge_multiplier: 0.2      # AGGRESSIVE: Trade even if profit is only slightly above fees
  min_seconds_between_trades: 5     # cooldown between any ENTRY/EXIT (very fast)
  min_seconds_before_reversal: 5    # Back to fast reversals
  reversal_min_confidence: 0.08     # BALANCED: 8% min for reversal
  reversal_min_score: 0.05          # Low threshold for score
  reversal_min_net_edge_pct: 0.0002    # 0.02% edge to flip position
  break_even_trigger_pct: 0.0005    # Move to breakeven after +0.05%
  break_even_buffer_pct: 0.0001     # lock in small profit
  trail_tighten_1_pct: 0.0020       # let winners breathe until +0.20%
  trail_tighten_2_pct: 0.0040       # tighten more after +0.40%
  min_profit_after_fees: 0.0001     
  runner_mode: true                 # let green trades run; exit on trailing/fade
  runner_take_profit_pct: 0.0060    # emergency hard TP only after +0.60%
  runner_fade_trigger_pct: 0.0030   # start watching fade after +0.30%
  runner_fade_exit_pct: 0.0012      # exit if winner gives back near +0.12%
  exit_on_reversal_only_in_profit: true 
  use_limit_orders: true            
  maker_only: true                  
  use_native_stop_loss: true    # Exchange-side reduce-only emergency stop after fill
  use_native_trailing_stop: false   
  trailing_callback_pct: 0.5        
    
  ttl_exit_seconds: 300             # 5min candles need more time to play out

# Dynamic Leverage (volatility + confidence based position sizing)
leverage:
  enabled: true                # Enable dynamic leverage scaling
  min_leverage: 3              # SAFER LIVE: smaller minimum leverage
  max_leverage: 5              # SAFER LIVE: cap dynamic leverage
  # Confidence thresholds for leverage levels (0-1 scale)
  confidence_levels:
    0.05: 3.0                  # Small edge -> 3x leverage
    0.15: 4.0                  # Low confidence -> 4x leverage
    0.30: 5.0                  # Moderate confidence -> 5x leverage
    0.50: 5.0                  # Strong signal -> 5x leverage
    0.75: 5.0                  # MAX -> 5x leverage
  use_score_multiplier: true   # Also factor in signal score (0-1) to adjust leverage
  score_weight: 0.3            # Balanced score weight
  atr_volatility_scaling: false # DISABLED: Don't scale down in high vol for ruthless mode
  atr_reference_pct: 0.015     # Target ATR% (1.5% of price) for full leverage (DOGE moderate vol)
  atr_min_multiplier: 0.2      # Minimum leverage multiplier when ATR is very high

# Multi-Timeframe Trend + S/R
mtf:
  enabled: true
  timeframes: ["3m", "15m", "1h", "4h"]
  min_agree: 2
  veto_on_missing: false
  max_age_seconds: 300          # 5min stale threshold (faster updates)
  sr_buffer_pct: 0.0015         # Tighter S/R buffer (0.15%) for DOGE
  mode: "soft"                  # soft => penalize counter-trend, don't hard block
    

# Terminal UI
ui:
  mode: "ansi"
  compact: true
  status_lines: 3
  alt_screen: true

# Memory/Log limits (prevents long runs from growing unbounded)
memory:
  max_closed_trades: 5000

logging:
  max_mb: 5
  backups: 3

# Auto-learning from closed trades
# Learns conservative indicator weights from recent ENTRY/EXIT outcomes.
auto_learning:
  enabled: true
  min_completed_trades: 30
  refresh_closed_trades: 10
  max_recent_trades: 300
  shrinkage: 0.35
  ai_advisor:
    enabled: true
    model: "gpt-4o-mini"
    max_weight_shift: 0.12

# Quant Strategy Parameters
strategy:
  max_spread: 0.0005        # TIGHT: 0.05% max spread
  min_conf: 0.10            # SAFER LIVE: require 10%+ confidence
  max_ret_30s: 0.0050     
  max_ret_5s: 0.0025      
  block_on_volume_spike: false  
  fixed_trade_usdt: 50   
  tp_pct: 0.0015          # QUICK SCALP: 0.15% target
  sl_pct: 0.0010          # TIGHT SL: 0.10%
    
  vol_filter_atr_pct: 0.0005  
  vol_filter_atr_max_pct: 0.08  
  pivot_discipline: false     # soft filter only; do not block valid scalps
  pivot_proximity_threshold: 0.0050 # WIDER GATES: 0.50% proximity (stops missing 'close' touches)

# Trend-pullback continuation entries
# If MTF + AI agree one way but the fast quant score is a mild pullback,
# place a resting maker order with the trend instead of doing nothing.
trend_pullback:
  enabled: true
  min_mtf_agree: 3
  max_counter_conf: 0.18
  max_level_distance_pct: 0.015
  entry_offset_pct: 0.0012
  cooldown_seconds: 120
    

# Risk Limits
risk:
  daily_loss_cap: 0.05     # 5% max daily drawdown → halt (higher for scalping)
  max_open_positions: 1    # Strictly 1 trade at a time as requested
  min_balance_floor: 60.0  # Emergency stop at $60 (plenty of room for scalping)

# Refresh Intervals (in ticks, 1 tick ≈ 0.2 seconds)
intervals:
  indicator_refresh: 150   # Refresh MTF every 30 seconds (150 * 0.2s)
  regime_refresh: 3000     # Refresh macro AI every 10 min
  tick_delay_seconds: 0.2  # HIGH FREQUENCY: Poll every 200ms
    

# AI Settings
ai:
  model: "gpt-4o-mini"
  enabled: false           # Disabled AI so it stops vetoing trades for testing

# AI Overlay (Tactical context based on MTF charts)
ai_overlay:
  enabled: true          # ENABLED: AI now watches the 3m/5m/15m charts
  model: "gpt-4o-mini"
  refresh_seconds: 300    # refresh every 5 minutes (matches candle close)

# Trade-Gating AI (evaluates each BUY/SELL before execution)
ai_trade:
  enabled: false          # disabled so AI does not veto fast scalps
  model: "gpt-4o-mini"
  min_interval_seconds: 30     # rate-limit AI calls
  on_error: "allow"            # allow | veto
  max_hold_minutes: 60
