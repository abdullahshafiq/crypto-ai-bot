# =============================================================================
# LIVE SWING-FILTERED SCALPING CONFIG
# =============================================================================
# Purpose: Scalp in the direction of confirmed 1h/4h swing bias on the 15m chart.
#          Fast entries, tight stops, aggressive trailing. No bag holding.
# =============================================================================

symbol: "AVAX/USDC:USDC"
timeframe: "15m"
macro_timeframe: "1h"

# Market data source (spot vs futures)
data:
  market: "auto"

# Execution Settings
execution:
  mode: "live"            # live trading
  market: "usdm"
  paused: false
  close_positions_on_pause: false
  panic_exit: false
  leverage: 2
  spot_balance_pct: 0.35
  spot_reserve_pct: 0.30
  spot_max_layers: 3
  paper_starting_balance_usdt: 50
  fee_rate: 0.0006
  fee_slippage_buffer_pct: 0.0002
  fee_edge_multiplier: 1.2
  min_seconds_between_trades: 120     # 2min minimum — trade frequently when setups appear
  min_seconds_before_reversal: 300
  reversal_min_confidence: 0.55
  reversal_min_score: 0.35
  reversal_min_net_edge_pct: 0.0030   # 0.3% edge required before reversing
  break_even_trigger_pct: 0.0015      # move to BE after +0.15% — wider SL needs larger cushion
  break_even_buffer_pct: 0.0002
  profit_trailing_enabled: true
  profit_trailing_activation_pct: 0.0020  # arm trailing after +0.20% profit
  trailing_tp_enabled: true
  trailing_tp_giveback_pct: 0.08          # give back only 8% of peak — squeeze profits
  trailing_tp_min_peak_pct: 0.0030        # needs at least +0.30% peak first
  trail_tighten_1_pct: 0.0040        # T1 trigger: tighten at 0.40% profit
  trail_tighten_2_pct: 0.0080        # T2 trigger: tighten at 0.80% profit
  trail_t1_gap_pct: 0.0015           # T1 trails 0.15% behind best price
  trail_t2_gap_pct: 0.0010           # T2 trails 0.10% behind best price
  min_profit_after_fees: 0.0010      # 0.10% min net profit to count as a win
  exit_on_reversal_only_in_profit: true
  use_limit_orders: true
  use_native_trailing_stop: true
  use_exchange_stop_loss: true
  use_exchange_take_profit: true
  market_fallback_on_timeout: true
  pending_entry_ttl_seconds: 15      # 15s to fill or cancel — fast or nothing
  use_resting_support_orders: true
  resting_entry_ttl_seconds: 300     # 5min resting orders only
  resting_entry_min_conf: 0.55
  resting_entry_offset_pct: 0.0005
  resting_entry_max_distance_pct: 0.0080  # entries within 0.8% only
  trailing_callback_pct: 0.25        # tight trailing callback
  same_side_reentry_cooldown_seconds: 120   # 2min cooldown — re-enter quickly when signal resets
  same_side_reentry_strong_confidence: 0.85
  scalp_min_hold_seconds: 30         # 30s minimum — fast in/out
  scalp_runner_enabled: true
  scalp_runner_pullback_pct: 0.0020
  scalp_runner_min_lock_pct: 0.0040
  scalp_runner_exchange_tp_multiplier: 3.0
  scalp_runner_partial_exit_pct: 0.50
  ttl_exit_seconds: 1200             # 20min max hold — no bag holding

# Dynamic Leverage (confidence-based)
leverage:
  enabled: true
  min_leverage: 1
  max_leverage: 3
  confidence_levels:
    0.30: 1.0                  # floor: 1x at minimum entry confidence
    0.50: 2.0                  # moderate conviction — go in at 2x
    0.65: 3.0                  # strong conviction — full 3x
    0.80: 3.0                  # max (3x — tight SL keeps dollar risk controlled)
  use_score_multiplier: true
  score_weight: 0.2
  atr_volatility_scaling: true
  atr_reference_pct: 0.005    # scalp targets ~0.5% ATR moves
  atr_min_multiplier: 0.5

# Multi-Timeframe Trend + S/R
mtf:
  enabled: true
  timeframes: ["5m", "15m", "1h", "4h"]
  min_agree: 3
  require_full_confirmation: false
  strict_veto_on_missing: false
  veto_on_missing: false
  max_age_seconds: 300         # 5min max age — scalp data must be fresh
  sr_buffer_pct: 0.0015        # tighter S/R buffer for 15m scalping
  mode: "hard"

# Terminal UI
ui:
  mode: "ansi"
  compact: true
  status_lines: 3
  alt_screen: true

# Memory/Log limits
memory:
  max_closed_trades: 5000

logging:
  max_mb: 5
  backups: 3

# Auto-learning from session trades (no historical data)
auto_learning:
  enabled: true
  min_completed_trades: 5
  refresh_closed_trades: 3
  max_recent_trades: 200
  shrinkage: 0.45
  ai_advisor:
    enabled: true
    model: "deepseek-chat"
    max_weight_shift: 0.12

# Quant Strategy Parameters
strategy:
  timeframe: "15m"              # mirror top-level; used by range veto lookback
  candles_per_day: 96           # 15m × 96 = 24h lookback for range position
  max_spread: 0.0005            # tight spread — scalping is spread-sensitive
  min_conf: 0.55                # raise bar — only high-conviction setups
  signal_smoothing_ticks: 2     # less smoothing — react fast to 15m signals
  max_ret_30s: 0.0050           # block entry if price moved >0.5% in last 30s
  max_ret_5s: 0.0025            # block entry if price moved >0.25% in last 5s
  block_on_volume_spike: false
  fixed_trade_usdt: 25
  tp_pct: 0.0120                # 1.20% TP — scaled up to match wider SL (4:1 R/R)
  sl_pct: 0.0030                # 0.30% SL — wide enough to survive AVAX 15m noise
  max_structural_sl_pct: 0.0040 # cap structural SL at 0.40%
  min_reward_risk: 3.0          # 4:1 R/R minimum — only high-quality scalps
  range_action_zone_pct: 0.20
  wall_veto_zone_pct: 0.12
  support_veto_pct: 0.0010
  resistance_veto_pct: 0.0010
  support_break_pct: 0.0010
  resistance_break_pct: 0.0010
  max_chase_pct: 0.0020         # tight chase tolerance — don't chase moves
  mtf_neutral_allow_score: 0.55 # higher bar when swing TF is neutral
  entry_min_confidence_hard: 0.50
  midrange_min_score: 0.40
  mtf_rsi_bull_level: 55
  mtf_rsi_bear_level: 45
  mtf_rsi_min_agree: 2
  vpoc_near_pct: 0.0015
  vpoc_break_pct: 0.0020
  session_filter_enabled: true
  session_block_hours_utc: []
  session_block_min_score: 0.45
  entry_near_resistance_block_pct: 0.0050  # block within 0.5% of resistance
  entry_near_support_block_pct: 0.0050
  macd_noise_threshold: 0.0001   # lower floor — catch 15m MACD signals earlier
  vol_filter_atr_pct: 0.0005
  vol_filter_atr_max_pct: 0.10
  low_vol_min_score: 0.55        # need higher score in low-vol environments
  wick_sweep_enabled: true
  wick_sweep_buffer_pct: 0.0010
  wick_sweep_reclaim_pct: 0.0005
  wick_sweep_wick_ratio: 1.5     # 15m wicks are tighter than swing
  wall_reversal_assist: true
  wall_reversal_score_gate: 0.15
  wall_breakout_score_gate: 0.20
  range_position_veto_enabled: true
  range_veto_top_pct: 0.80
  range_veto_bottom_pct: 0.20
  range_veto_escape_score: 0.75
  rsi_ob_entry_gate: 75          # block longs above 75 RSI on 15m
  rsi_os_entry_gate: 25          # block shorts below 25 RSI on 15m
  orb_volume_mult: 1.5
  spread_atr_ratio_max: 0.12
  ob_midpoint_tolerance_pct: 0.0020
  anchored_vwap_near_pct: 0.0015
  loss_tilt_min_losses: 3
  loss_tilt_pause_losses: 5
  loss_tilt_pause_minutes: 15    # 15min pause after loss streak — back sooner

# Rejection confirmation gate
rejection_confirmation:
  enabled: true
  min_bars_away: 1               # 1 bar confirmation on 15m = 15min
  macd_threshold: 0.0
  pullback_pct: 0.003            # require 0.3% pullback before entry
  require_psar_flip: false       # don't wait for PSAR flip; PSAR trend is enough

# Spot settings
spot:
  mode: "grid"
  max_layers: 3
  layer_quote_pct: 0.20
  reserve_quote_pct: 0.30
  buy_near_support_pct: 0.0300
  sell_near_resistance_pct: 0.0050
  layer_spacing_pct: 0.0080
  emergency_break_pct: 0.0100
  min_take_profit_pct: 0.0150
  min_trail_profit_quote: 0.10

# Risk Limits
risk:
  daily_loss_cap: 0.10
  disable_loss_cap: false
  max_open_positions: 1
  min_balance_floor: 0.0

# Refresh Intervals (in ticks, 1 tick ≈ 5 seconds on swing)
intervals:
  indicator_refresh: 3         # recalc every 3 ticks (~3s) — fast signal response
  regime_refresh: 300          # macro regime every 5 min
  tick_delay_seconds: 1.0      # 1s loop — scalping needs fast polling

# AI Settings (consolidated)
ai:
  enabled: true
  model: "gpt-4o-mini"
  overlay_enabled: true
  overlay_refresh_seconds: 300   # refresh overlay every 5 min
  trade_gate_enabled: true       # enable AI gate — fewer trades, worth the latency
  trade_gate_min_interval: 300
  trade_gate_on_error: "allow"

# Local web dashboard
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8765
  candle_limit: 240
